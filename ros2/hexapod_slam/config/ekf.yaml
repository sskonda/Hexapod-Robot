ekf_filter_node:
  ros__parameters:
    # Raw locomotion odom and the BNO055 IMU are both relatively low-bandwidth
    # compared to desktop-class robots, so the EKF does not need to run much
    # faster than the real measurements it is fusing.
    frequency: 10.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: odom/raw
    odom0_queue_size: 5
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 3.0
    odom0_config: [true,  true,  false,
                   false, false, false,
                    true,  true,  false,
                   false, false, false,
                   false, false, false]

    imu0: /imu/data_raw
    imu0_queue_size: 10
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    # The BNO055 publisher now inflates yaw covariance whenever heading is
    # gyro-only or magnetically rejected, so the EKF should only trust absolute
    # yaw when the message itself advertises that trust.
    imu0_pose_rejection_threshold: 2.0
    imu0_twist_rejection_threshold: 2.5
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
