ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: odom/raw
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_config: [true,  true,  false,
                   false, false, true,
                    true,  true,  false,
                   false, false, true,
                   false, false, false]

    imu0: /imu/data_raw
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
